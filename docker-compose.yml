services:

  db:
    image: postgres:17
    container_name: irrigo-db
    
    env_file:
    - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"
    networks:
      - irrigo_net
    
    #restart: unless-stopped

  backend:
    build:
      context: ./backend

    container_name: irrigo-backend

    depends_on:
      - db

    env_file:
    - .env

    ports:
      - "8000:8000"
    networks:
      - irrigo_net

    #restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}

    container_name: irrigo-frontend

    depends_on:
      - backend
    
    env_file:
    - .env
    
    ports:
      - "3000:80"

    #restart: unless-stopped
    networks:
      - irrigo_net

volumes:
  postgres_data:

networks:
  irrigo_net: